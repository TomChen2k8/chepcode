<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hoa viên Coffee</title>
  <link rel = "stylesheet" href = "styles.css" />
</head>
<body>
  <div class="container">
    <h1>Hoa viên Coffee</h1>

    <nav>
      <ul>
        <li><a href="#">Trang chủ</a></li>
        <li><a href="#">Giới thiệu</a></li>
        <li><a href="#">Dịch vụ</a></li>
        <li><a href="#">Liên hệ</a></li>
      </ul>
    </nav>

    <div class="intro">
      <ul>
        <li>An toàn.</li>
        <li>Chất lượng.</li>
        <li>Tiện lợi phục vụ.</li>
      </ul>
    </div>

    <h2>Menu</h2>
    <table>
      <tr>
        <th>Thức uống</th>
        <th>Giá</th>
      </tr>
      <tr>
        <td>Black</td>
        <td>15k</td>
      </tr>
      <tr>
        <td>White</td>
        <td>20k</td>
      </tr>
      <tr>
        <td>White chocolate</td>
        <td>20k</td>
      </tr>
      <tr>
        <td>Sweet milk</td>
        <td>20k</td>
      </tr>
    </table>

    <h2>Góp ý</h2>
    <form>
      <label for="hoten">Họ và Tên:</label>
      <input type="text" id="hoten" name="hoten" />

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" />

      <label for="gioitinh">Giới tính:</label>
      <select id="gioitinh" name="gioitinh">
        <option>Nam</option>
        <option>Nữ</option>
        <option>Khác</option>
      </select>

      <label for="tinnhan">Tin nhắn:</label>
      <textarea id="tinnhan" name="tinnhan"></textarea>

      <button type="submit">Gửi</button>
    </form>
  </div>
</body>
</html>
